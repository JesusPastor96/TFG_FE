<mat-toolbar>
  <button matIconButton class="example-icon" aria-label="Example icon-button with menu icon" matTooltip="Menu"
    matTooltipPosition="below" (click)="drawer.toggle()">
    <mat-icon>menu</mat-icon>
  </button>
  <div class="user-info-section">
    @if (authService.roleValue) {
      <span class="role-badge" [class]="authService.roleValue.toLowerCase()">
        {{ authService.hasRole(Role.ROLE_ADMIN) ? 'Admin' : authService.roleValue.replace('ROLE_', '') }}
      </span>
    }

    @if (authService.userFullName) {
      <span class="welcome-text">
        <span class="hide-mobile">Bienvenido,</span>
        <span class="user-name">{{ authService.userFullName }}</span>
      </span>
    }
  </div>
  <span class="example-spacer"></span>

  <app-theme-selector />
  <app-settings-menu />
</mat-toolbar>

<mat-drawer-container class="example-container">
  <mat-drawer #drawer [mode]="isMobile() ? 'over' : 'side'" [opened]="!isMobile()" position="start">
    <app-sidebar-menu [isMobile]="isMobile()" [userRole]="authService.roleValue"
      [pendingAdmissions]="pendingAdmissionsCount()" (itemClicked)="onNavigate()" />
  </mat-drawer>
  <mat-drawer-content style="padding: 5px">
    <router-outlet />
  </mat-drawer-content>
</mat-drawer-container>
